server:
  port: 8761 # The standard port for Eureka Server

spring:
  application:
    name: eureka-server

eureka:
  instance:
    hostname: localhost
  client:
    # We set these to false because THIS is the server.
    # It doesn't need to register with itself or fetch a registry from itself.
    register-with-eureka: false
    fetch-registry: false
    service-url:
      defaultZone: http://${eureka.instance.hostname}:${server.port}/eureka/